<div class="min-h-screen bg-gray-900 flex items-center justify-center px-4">

  <div class="w-full max-w-md">

    <!-- Logo / Brand -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-orange-500 rounded-full mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white tracking-wide">WorkShop Manager</h1>
      <p class="text-gray-400 text-sm mt-1">Taller & Repuestos</p>
    </div>

    <!-- Card -->
    <div class="bg-gray-800 rounded-2xl shadow-2xl p-8 border border-gray-700">
      <h2 class="text-xl font-semibold text-white mb-6">Iniciar sesión</h2>

      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-5">

        <!-- Email -->
        <div>
          <label for="email" class="block text-sm font-medium text-gray-300 mb-1">Email</label>
          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="correo@ejemplo.com"
            class="w-full bg-gray-700 text-white placeholder-gray-500 border border-gray-600 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent transition"
          />
          @if (form.get('email')?.invalid && form.get('email')?.touched) {
            <p class="text-red-400 text-xs mt-1">Ingresa un email válido.</p>
          }
        </div>

        <!-- Password -->
        <div>
          <label for="password" class="block text-sm font-medium text-gray-300 mb-1">Contraseña</label>
          <input
            id="password"
            type="password"
            formControlName="password"
            placeholder="••••••••"
            class="w-full bg-gray-700 text-white placeholder-gray-500 border border-gray-600 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent transition"
          />
          @if (form.get('password')?.invalid && form.get('password')?.touched) {
            <p class="text-red-400 text-xs mt-1">La contraseña es requerida.</p>
          }
        </div>

        <!-- Error general -->
        @if (errorMessage()) {
          <div class="bg-red-500/10 border border-red-500/30 rounded-lg px-4 py-3">
            <p class="text-red-400 text-sm">{{ errorMessage() }}</p>
          </div>
        }

        <!-- Botón -->
        <button
          type="submit"
          [disabled]="loading()"
          class="w-full bg-orange-500 hover:bg-orange-600 disabled:bg-orange-500/50 disabled:cursor-not-allowed text-white font-semibold rounded-lg px-4 py-2.5 text-sm transition-colors duration-200"
        >
          @if (loading()) {
            <span class="flex items-center justify-center gap-2">
              <svg class="animate-spin w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
              </svg>
              Cargando...
            </span>
          } @else {
            Ingresar
          }
        </button>

      </form>
    </div>

  </div>
</div>
